<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biglietto treno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
</head>
<body class="bg-primary">
    <form>
        <div class="col">
            <div class="row" ><h2 class="text-center  text-white mt-5"><strong>CALCOLA IL PREZZO DEL TUO BIGLIETTO</strong></h2></div>
            <div class="row bg-white m-5">
                <div class="col-4 p-5 text-center">
                    <div class="row"><p >Nome e Cognome</p></div>
                    <div class="row">
                        <input class="name-surname" type="text" placeholder="Insert Name and Surname..." aria-label="readonly input example">
                    </div>
                </div>
                <div class="col-4 p-5 text-center">
                    <div class="row"><p >Km da percorrere</p></div>
                    <div class="row">
                        <input class="km-value" type="text" placeholder="Insert Km..." aria-label="readonly input example">
                    </div>
                </div>
                <div class="col-4 p-5 text-center">
                    <div class="row"><p>Fascia d'età</p></div>
                    <div class="row">
                        <select class="age-selection" aria-label="Disabled select example" enable>
                            <option value="1">Maggiorenne</option>
                            <option value="2">Minorenne</option>
                            <option value="3">Over 65</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-center gap-3 mb-3">
                <button type="submit" class="btn btn-secondary btn-submit">Genera</button>
                <button type="reset" class="btn btn-secondary btn-reset">Annulla</button>
            </div>
            <div class="row" ><h2 class="text-center  text-white m-1"><strong>IL TUO BIGLIETTO</strong></h2></div>
            </div>
            <div class="row bg-white m-5 p-3">
                <div class="col">
                    <div class="row"><h3 class="text-black"><strong>DETTAGLI PASSEGGIERO</strong></h3></div>
                    <div class="row border border-dark">
                        <div class="col-3"> 
                            <div class="row text-black bg-secondary pt-2"><p><strong>NOME PASSEGGERO:</strong></p><br><p><strong id="name_surname_output">Nome e Cognome</strong></p></div>
                        </div>
                        <div class="col-9">
                            <div class="row">
                                <div class="col">
                                    <div class="row pt-2"><p><strong>Offerta</strong></p></div>
                                    <div class="row"><p id="offer_type">None</p></div>
                                </div>
                                <div class="col">
                                    <div class="row pt-2"><p><strong>Carrozza</strong></p></div>
                                    <div class="row"> <p id="cabinet_num">None</p></div>
                                </div>
                                <div class="col">
                                    <div class="row pt-2"><p><strong>Codice CP</strong></p></div>
                                    <div class="row"><p id="code_num">None</p></div>
                                </div>
                                <div class="col">
                                    <div class="row pt-2"><p><strong>Costo biglietto</strong></p></div>
                                    <div class="row"><p id="cost_num">None</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>          
            </div>
        </div>      
    </form>
    <script src="script.js"></script>    
</body>
</html>
